<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="18" ry="18" fill="#000a54"/>

  <!-- Tooth outline with diamond inside -->
  <g transform="translate(100,52)">
    <!-- Outer tooth shape -->
    <path d="M0,-32 C-18,-32 -28,-20 -28,-8 C-28,4 -22,10 -18,22 C-14,34 -12,44 -6,50 C-3,53 0,52 0,48 C0,44 4,38 0,34 C-4,30 -4,22 0,18 C4,22 4,30 0,34 C-4,38 0,44 0,48 C0,52 3,53 6,50 C12,44 14,34 18,22 C22,10 28,4 28,-8 C28,-20 18,-32 0,-32 Z" fill="none" stroke="white" stroke-width="3"/>
    <!-- Diamond inside tooth -->
    <polygon points="0,-22 10,-10 0,2 -10,-10" fill="white" opacity="0.9"/>
    <polygon points="0,-22 10,-10 0,-16" fill="white" opacity="0.5"/>
  </g>

  <!-- SMILE -->
  <text x="100" y="116" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="white" letter-spacing="2">SMILE</text>

  <!-- CENTER GH. -->
  <text x="100" y="143" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="21" fill="white" letter-spacing="1.5">CENTER GH.</text>

  <!-- Divider line -->
  <line x1="30" y1="152" x2="170" y2="152" stroke="white" stroke-width="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="100" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="9.5" fill="white" opacity="0.85" letter-spacing="0.3">Your Best Laser Teeth Whitening</text>
</svg>
